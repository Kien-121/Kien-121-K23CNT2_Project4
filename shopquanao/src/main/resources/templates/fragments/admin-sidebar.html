<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-white" style="width: 260px; min-height: 100vh; background-color: #1a1a1a; border-right: 1px solid #333;">

    <a th:href="@{/admin/dashboard}" class="d-flex align-items-center mb-1 text-white text-decoration-none justify-content-center">
        <i class="bi bi-shield-check fs-3 me-2"></i>
        <span class="fs-4 fw-bold">N11NHK Admin</span>
    </a>
    <div class="text-center text-muted small mb-4">Quản lý cửa hàng</div>

    <hr class="border-secondary mb-4">

    <ul class="nav nav-pills flex-column mb-auto gap-2">

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/dashboard}" class="nav-link text-white" th:classappend="${activePage == 'dashboard' ? 'active bg-primary' : ''}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/admin/naptien}"
               class="nav-link text-white mb-1"
               th:classappend="${activePage == 'naptien' ? 'active' : ''}">
                <i class="bi bi-bank me-2"></i> Duyệt Nạp Tiền
            </a>
        </li>

        <li>
            <a th:href="@{/admin/sanpham}" class="nav-link text-white" th:classappend="${activePage == 'sanpham' ? 'active bg-primary' : ''}">
                <i class="bi bi-box-seam me-2"></i> Quản lý Sản phẩm
            </a>
        </li>

        <li>
            <a th:href="@{/admin/danhmuc}" class="nav-link text-white" th:classappend="${activePage == 'danhmuc' ? 'active bg-primary' : ''}">
                <i class="bi bi-tags me-2"></i> Quản lý Danh mục
            </a>
        </li>

        <li>
            <a th:href="@{/admin/donhang}" class="nav-link text-white" th:classappend="${activePage == 'donhang' ? 'active bg-primary' : ''}">
                <i class="bi bi-receipt me-2"></i> Quản lý Đơn hàng
            </a>
        </li>

        <li>
            <a th:href="@{/admin/kho}" class="nav-link text-white" th:classappend="${activePage == 'kho' ? 'active bg-primary' : ''}">
                <i class="bi bi-box-arrow-in-down me-2"></i> Quản lý Nhập Kho
            </a>
        </li>

        <hr class="border-secondary my-2">

        <li>
            <a th:href="@{/admin/khachhang}" class="nav-link text-white" th:classappend="${activePage == 'khachhang' ? 'active bg-primary' : ''}">
                <i class="bi bi-people me-2"></i> Quản lý Khách hàng
            </a>
        </li>

        <li sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/nhanvien}" class="nav-link text-white" th:classappend="${activePage == 'nhanvien' ? 'active bg-primary' : ''}">
                <i class="bi bi-person-badge me-2"></i> Quản lý Nhân viên
            </a>
        </li>

        <hr class="border-secondary my-2">

        <li>
            <a th:href="@{/admin/tintuc}" class="nav-link text-white" th:classappend="${activePage == 'tintuc' ? 'active bg-primary' : ''}">
                <i class="bi bi-newspaper me-2"></i> Quản lý Tin tức
            </a>
        </li>

        <li>
            <a th:href="@{/admin/voucher}" class="nav-link text-white" th:classappend="${activePage == 'voucher' ? 'active bg-primary' : ''}">
                <i class="bi bi-ticket-perforated me-2"></i> Quản lý Voucher
            </a>
        </li>

        <li>
            <a th:href="@{/admin/banner}" class="nav-link text-white" th:classappend="${activePage == 'banner' ? 'active bg-primary' : ''}">
                <i class="bi bi-images me-2"></i> Quản lý Banner
            </a>
        </li>
    </ul>

    <hr class="border-secondary mt-4">

    <ul class="nav nav-pills flex-column gap-2 mb-2">
        <li>
            <a th:href="@{/}" class="nav-link text-secondary custom-hover-white">
                <i class="bi bi-house-door me-2"></i> Xem trang khách
            </a>
        </li>
        <li>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="nav-link text-danger w-100 text-start bg-transparent border-0 fw-bold">
                    <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                </button>
            </form>
        </li>
    </ul>

</div>

</body>
</html>
