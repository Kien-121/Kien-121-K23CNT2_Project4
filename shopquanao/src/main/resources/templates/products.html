<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng - N11NHK Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap');

        body {
            background-color: #f9fbf9; color: #2c3e50; font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* SIDEBAR BỘ LỌC */
        .sidebar-card {
            background: #fff; border: 1px solid #eef2ee; border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); padding: 20px; margin-bottom: 20px;
        }
        .filter-title { color: #354f52; font-weight: 800; font-size: 1.1rem; border-bottom: 2px solid #e8f0e9; padding-bottom: 10px; margin-bottom: 15px;}
        .category-list a {
            color: #555; text-decoration: none; font-weight: 600; display: block;
            padding: 8px 12px; border-radius: 8px; transition: 0.2s;
        }
        .category-list a:hover { background-color: #e8f0e9; color: #52796f; padding-left: 18px;}
        .category-list a.active { background-color: #84a98c; color: white; }

        /* THẺ SẢN PHẨM */
        .product-card {
            background: #fff; border: 1px solid #eef2ee; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px); box-shadow: 0 10px 20px rgba(132, 169, 140, 0.12); border-color: #cadfd0;
        }
        .product-image-container { overflow: hidden; border-radius: 12px 12px 0 0; }
        .product-card img { transition: transform 0.5s ease; }
        .product-card:hover img { transform: scale(1.05); }
        .price-text { color: #52796f; font-weight: 800; font-size: 1.2rem; }
        .badge-category { background-color: #e8f0e9; color: #52796f; font-weight: 600; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem;}
        .btn-theme { background-color: #84a98c; color: white; border: none; font-weight: 600; }
        .btn-theme:hover { background-color: #52796f; color: white; }
        .btn-outline-theme { border: 2px solid #84a98c; color: #84a98c; font-weight: 600; background: transparent; }
        .btn-outline-theme:hover { background-color: #84a98c; color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: chonguoidung}"></div>

<div class="container mt-4 mb-5 flex-grow-1">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none" style="color: #84a98c;">Trang chủ</a></li>
            <li class="breadcrumb-item active fw-bold text-secondary" aria-current="page">Cửa hàng</li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- CỘT TRÁI: BỘ LỌC -->
        <div class="col-lg-3">
            <div class="sidebar-card">
                <h5 class="filter-title"><i class="bi bi-search"></i> Tìm Kiếm</h5>
                <form th:action="@{/search}" method="GET" class="d-flex flex-column gap-2">
                    <input type="text" name="keyword" class="form-control" placeholder="Tên sản phẩm..." th:value="${keyword}">
                    <button type="submit" class="btn btn-theme w-100 mt-1">Lọc kết quả</button>
                </form>
            </div>

            <div class="sidebar-card">
                <h5 class="filter-title"><i class="bi bi-tags"></i> Danh Mục</h5>
                <div class="category-list">
                    <a th:href="@{/products}" class="mb-1"><i class="bi bi-grid"></i> Tất cả sản phẩm</a>
                    <th:block th:each="dm : ${danhSachDanhMuc}">
                        <a th:href="@{/danhmuc/{id}(id=${dm.id})}" class="mb-1">
                            <i class="bi bi-caret-right-fill text-muted" style="font-size: 0.8rem;"></i> <span th:text="${dm.name}"></span>
                        </a>
                    </th:block>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: DANH SÁCH SẢN PHẨM -->
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom border-light-subtle">
                <h3 class="fw-bold m-0" style="color: #354f52;">Sản Phẩm Của Chúng Tôi</h3>
                <span class="text-muted fw-semibold badge bg-light border text-dark fs-6" th:text="${#lists.size(danhSachSanPham)} + ' sản phẩm'">0 sản phẩm</span>
            </div>

            <div class="row row-cols-1 row-cols-md-3 g-4">
                <div class="col" th:each="sp : ${danhSachSanPham}">
                    <div class="card h-100 product-card">
                        <div class="product-image-container">
                            <img th:src="${sp.image != null and sp.image != '' ? sp.image : 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80'}"
                                 class="card-img-top" alt="Ảnh sản phẩm" style="height: 280px; object-fit: cover;">
                        </div>

                        <div class="card-body d-flex flex-column p-3">
                            <div class="mb-1">
                                <span class="badge-category" th:text="${sp.danhMuc != null ? sp.danhMuc.name : 'Khác'}">Phân loại</span>
                            </div>
                            <h6 class="card-title mt-2 mb-2 fw-bold" th:text="${sp.name}">Tên sản phẩm</h6>

                            <!-- CỤM 3 NÚT HÀNH ĐỘNG -->
                            <div class="mt-auto d-flex justify-content-between align-items-center pt-3 border-top" style="border-color: #f0f0f0 !important;">
                                <span class="price-text" th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">Giá</span>

                                <div class="d-flex gap-2">
                                    <!-- 1. Nút Xem chi tiết (Mắt) - Ai cũng xem được -->
                                    <a th:href="@{/sanpham/{id}(id=${sp.id})}"
                                       class="btn rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                                       style="background-color: #84a98c; width: 35px; height: 35px; transition: 0.2s;"
                                       title="Xem chi tiết"
                                       onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                        <i class="bi bi-eye"></i>
                                    </a>

                                    <!-- TRƯỜNG HỢP 1: CHƯA ĐĂNG NHẬP -> Chuyển hướng ra trang Login -->
                                    <th:block sec:authorize="!isAuthenticated()">
                                        <a th:href="@{/login}"
                                           class="btn rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                                           style="background-color: #52796f; width: 35px; height: 35px; transition: 0.2s;"
                                           title="Vui lòng đăng nhập"
                                           onclick="alert('Bạn cần đăng nhập để mua hàng!');"
                                           onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                            <i class="bi bi-cart-plus"></i>
                                        </a>

                                        <a th:href="@{/login}"
                                           class="btn rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                                           style="background-color: #354f52; width: 35px; height: 35px; transition: 0.2s;"
                                           title="Vui lòng đăng nhập"
                                           onclick="alert('Bạn cần đăng nhập để mua hàng!');"
                                           onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                            <i class="bi bi-bag-check"></i>
                                        </a>
                                    </th:block>

                                    <!-- TRƯỜNG HỢP 2: ĐÃ ĐĂNG NHẬP -> Chuyển hướng vào trang Chi Tiết để chọn Size -->
                                    <th:block sec:authorize="isAuthenticated()">
                                        <a th:href="@{/sanpham/{id}(id=${sp.id})}"
                                           class="btn rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                                           style="background-color: #52796f; width: 35px; height: 35px; transition: 0.2s;"
                                           title="Vào trang chi tiết để chọn kích cỡ"
                                           onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                            <i class="bi bi-cart-plus"></i>
                                        </a>

                                        <a th:href="@{/sanpham/{id}(id=${sp.id})}"
                                           class="btn rounded-circle text-white d-flex align-items-center justify-content-center shadow-sm"
                                           style="background-color: #354f52; width: 35px; height: 35px; transition: 0.2s;"
                                           title="Vào trang chi tiết để chọn kích cỡ"
                                           onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                                            <i class="bi bi-bag-check"></i>
                                        </a>
                                    </th:block>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- THÔNG BÁO NẾU KHÔNG CÓ SẢN PHẨM -->
                <div th:if="${#lists.isEmpty(danhSachSanPham)}" class="col-12 text-center text-muted mt-5 py-5 w-100">
                    <i class="bi bi-search fs-1 text-secondary"></i>
                    <h4 class="mt-3">Không tìm thấy sản phẩm nào phù hợp.</h4>
                    <a th:href="@{/products}" class="btn btn-theme mt-2">Xem tất cả sản phẩm</a>
                </div>
            </div>

        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<!-- SCRIPT XỬ LÝ THÊM VÀO GIỎ HÀNG KHÔNG LOAD TRANG VÀ HIỆN TOAST -->
<script>
    function addToCartAjax(productId) {
        const formData = new URLSearchParams();
        formData.append('productId', productId);
        formData.append('quantity', 1);

        fetch('/cart/add', {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
            .then(response => {
                if (response.ok) {
                    showToast('Đã thêm sản phẩm vào giỏ hàng thành công!');
                } else {
                    throw new Error('Lỗi phản hồi từ máy chủ');
                }
            })
            .catch(error => {
                console.error('Lỗi:', error);
                alert('Có lỗi xảy ra khi thêm vào giỏ hàng.');
            });
    }

    function showToast(message) {
        let toastContainer = document.getElementById('toastContainer');
        if (!toastContainer) {
            toastContainer = document.createElement('div');
            toastContainer.id = 'toastContainer';
            toastContainer.className = 'position-fixed bottom-0 end-0 p-3';
            toastContainer.style.zIndex = '1055';
            document.body.appendChild(toastContainer);
        }

        const toastHtml = `
            <div class="toast align-items-center text-bg-success border-0 show shadow-lg mb-2" role="alert" aria-live="assertive" aria-atomic="true">
              <div class="d-flex">
                <div class="toast-body fw-bold fs-6">
                  <i class="bi bi-check-circle-fill me-2"></i> ${message}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close" onclick="this.parentElement.parentElement.remove()"></button>
              </div>
            </div>
        `;

        const toastElement = document.createElement('div');
        toastElement.innerHTML = toastHtml;
        const actualToast = toastElement.firstElementChild;
        toastContainer.appendChild(actualToast);

        // Tự động xóa thông báo sau 3 giây
        setTimeout(() => {
            if (actualToast) {
                actualToast.classList.remove('show');
                setTimeout(() => actualToast.remove(), 300);
            }
        }, 3000);
    }
</script>
</body>
</html>
