<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - N11NHK Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        /* CSS tự viết để căn giữa màn hình và tạo nền gradient */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: none;
        }
        .login-header {
            background-color: #212529;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="login-header">
                    <h3 class="mb-0 fw-bold">N11NHK Shop</h3>
                    <p class="mb-0 text-muted" style="font-size: 0.9rem;">Chào mừng bạn quay trở lại!</p>
                </div>

                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger text-center p-2 mb-3">
                        <i class="bi bi-exclamation-triangle-fill"></i> Sai tài khoản hoặc mật khẩu!
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success text-center p-2 mb-3">
                        <i class="bi bi-check-circle-fill"></i> Bạn đã đăng xuất thành công.
                    </div>

                    <div th:if="${param.registerSuccess}" class="alert alert-success text-center p-2 mb-3">
                        <i class="bi bi-check-circle-fill"></i> Đăng ký thành công! Mời bạn đăng nhập.
                    </div>

                    <form th:action="@{/login}" method="POST">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold mb-3">Đăng Nhập</button>

                        <div class="text-center">
                            <span class="text-muted">Chưa có tài khoản?</span>
                            <a th:href="@{/register}" class="text-decoration-none fw-bold text-dark">Đăng ký ngay</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
