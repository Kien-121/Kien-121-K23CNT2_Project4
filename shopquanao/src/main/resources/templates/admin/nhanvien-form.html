<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Nhân Viên - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; color: #333; font-family: 'Nunito', sans-serif; }
        .content-wrapper { background-color: #ffffff; border-radius: 16px; padding: 35px 40px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .btn-theme { background-color: #2b5155; color: #fff; font-weight: bold; }
        .btn-theme:hover { background-color: #1f3b3e; color: #fff; }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">
            <div class="mb-4">
                <a th:href="@{/admin/nhanvien}" class="text-decoration-none text-muted fw-bold"><i class="bi bi-arrow-left"></i> Quay lại</a>
                <h2 class="fw-bold mt-2" style="color: #2b5155;"><i class="bi bi-person-badge me-2"></i>Thêm Nhân Viên Mới</h2>
                <p class="text-muted small">Tạo hồ sơ và cấp tài khoản đăng nhập cho nhân viên mới.</p>
            </div>

            <form th:action="@{/admin/nhanvien/save}" method="post" th:object="${nhanVien}">
                <input type="hidden" th:field="*{id}">

                <div class="row g-4">
                    <div class="col-12">
                        <h5 class="fw-bold border-bottom pb-2" style="color: #40777b;">1. Thông tin cá nhân</h5>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Họ và tên nhân viên <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="VD: Nguyễn Văn A..." required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Vị trí / Chức vụ <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{position}" placeholder="VD: Nhân viên kho, CSKH..." required>
                    </div>

                    <div class="col-12 mt-5">
                        <h5 class="fw-bold border-bottom pb-2" style="color: #40777b;">2. Cấp tài khoản hệ thống</h5>
                        <small class="text-muted">Bỏ trống nếu chỉ muốn lưu hồ sơ mà không cấp quyền đăng nhập web.</small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Tên đăng nhập (Username)</label>
                        <input type="text" class="form-control" name="new_username" placeholder="VD: nhanvien01">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Mật khẩu</label>
                        <input type="password" class="form-control" name="new_password" placeholder="Nhập mật khẩu cho nhân viên">
                    </div>
                </div>

                <hr class="my-4">
                <div class="d-flex gap-2">
                    <a th:href="@{/admin/nhanvien}" class="btn btn-light border fw-bold px-4 py-2 rounded-3">Hủy bỏ</a>
                    <button type="submit" class="btn btn-theme px-4 py-2 rounded-3"><i class="bi bi-save me-1"></i> Lưu Hồ Sơ</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
