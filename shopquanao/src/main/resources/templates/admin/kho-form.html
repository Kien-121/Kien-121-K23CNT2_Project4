<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Phiếu Nhập Kho - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; color: #333; font-family: 'Nunito', sans-serif; }
        .content-wrapper { background-color: #ffffff; border-radius: 16px; padding: 35px 40px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        h2.fw-bold { color: #2b5155; font-weight: 800 !important; }
        .btn-theme { background-color: #2b5155; color: #fff; font-weight: bold; }
        .btn-theme:hover { background-color: #1f3b3e; color: #fff; }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">
            <div class="mb-4">
                <a th:href="@{/admin/kho}" class="text-decoration-none text-muted fw-bold"><i class="bi bi-arrow-left"></i> Quay lại</a>
                <h2 class="fw-bold mt-2"><i class="bi bi-box-arrow-in-down me-2"></i>Thêm Phiếu Nhập Mới</h2>
            </div>

            <form th:action="@{/admin/kho/save}" th:object="${phieuNhap}" method="post">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-secondary">Chọn Sản Phẩm <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{sanPham.id}" required>
                            <option value="">-- Chọn sản phẩm --</option>
                            <option th:each="sp : ${danhSachSanPham}" th:value="${sp.id}" th:text="${sp.name}"></option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold text-secondary">Size (Kích Cỡ) <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{size}" required>
                            <option value="S">Size S</option>
                            <option value="M">Size M</option>
                            <option value="L">Size L</option>
                            <option value="XL">Size XL</option>
                            <option value="XXL">Size XXL</option>
                            <option value="Freesize">Freesize</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label fw-bold text-secondary">Số Lượng Nhập <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{soLuongNhap}" min="1" required placeholder="VD: 50">
                    </div>
                </div>

                <hr class="my-4">
                <button type="submit" class="btn btn-theme px-4 py-2 rounded-3"><i class="bi bi-check2-circle me-1"></i> Lưu Phiếu Nhập</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
