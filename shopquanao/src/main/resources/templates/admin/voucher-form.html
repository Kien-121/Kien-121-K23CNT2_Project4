<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Biên tập Voucher - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Nền tổng thể và phông chữ */
        body {
            background-color: #f4f6f9;
            color: #333;
            font-family: 'Nunito', sans-serif;
        }

        /* Khung trắng chứa form - Thêm shadow mượt mà */
        .content-wrapper {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* Ghi đè tiêu đề h3 */
        h3.fw-bold {
            color: #2b5155;
            font-weight: 800 !important;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        /* Nhãn form (Ghi đè class text-secondary) */
        .form-label.text-secondary {
            font-weight: 700 !important;
            color: #2b5155 !important;
            margin-bottom: 8px;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        /* Ô input form */
        .form-control {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            color: #334155;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .form-control::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .form-control:hover {
            border-color: #94a3b8;
        }

        /* Hiệu ứng focus - sáng viền xanh cổ vịt */
        .form-control:focus {
            background-color: #ffffff;
            border-color: #2b5155;
            color: #1e293b;
            box-shadow: 0 0 0 4px rgba(43, 81, 85, 0.1);
        }

        /* Đổi nút "Lưu Voucher" sang màu xanh cổ vịt */
        .btn-primary {
            background-color: #2b5155 !important;
            border-color: #2b5155 !important;
            color: #ffffff !important;
            border-radius: 10px;
            padding: 12px 0;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(43, 81, 85, 0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #1e3b3e !important;
            border-color: #1e3b3e !important;
            box-shadow: 0 6px 12px rgba(43, 81, 85, 0.3);
            transform: translateY(-2px);
        }

        /* Bo góc nút Hủy */
        .btn-outline-secondary {
            border-radius: 10px;
            padding: 12px 0;
            color: #64748b;
            border-color: #cbd5e1;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-outline-secondary:hover {
            background-color: #f1f5f9;
            color: #334155;
            border-color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="content-wrapper mt-4">
            <h3 class="fw-bold mb-4" th:text="${voucher.id == null ? 'Thêm Voucher Mới' : 'Sửa Voucher'}"></h3>

            <form th:action="@{/admin/voucher/save}" th:object="${voucher}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold">Tên mã (VD: MUAHE50K)</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold">Mức giảm giá (%)</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{discount}" placeholder="VD: 15.5" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold">Ngày bắt đầu</label>
                    <input type="date" class="form-control" th:field="*{startDate}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold">Ngày kết thúc</label>
                    <input type="date" class="form-control" th:field="*{endDate}" required>
                </div>

                <div class="d-flex gap-3">
                    <a th:href="@{/admin/voucher}" class="btn btn-outline-secondary w-50">Hủy</a>
                    <button type="submit" class="btn btn-primary w-50">Lưu Voucher</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
