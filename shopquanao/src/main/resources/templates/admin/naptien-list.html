<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Duyệt Nạp Tiền - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS Giao diện sáng đồng bộ */
        body {
            background-color: #f4f6f9;
            color: #333;
            font-family: 'Nunito', sans-serif;
        }

        .content-wrapper {
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            border: 1px solid #e3e6f0;
        }

        .page-title {
            color: #2b5155;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        /* Chỉnh màu bảng */
        .table th {
            color: #2b5155;
            font-weight: 700;
            font-size: 0.95rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .table td {
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #edf2f7;
            font-weight: 600;
        }

        /* Màu tiền tệ và mã yêu cầu */
        .price-text {
            color: #2b5155;
            font-weight: 800;
        }
        .yc-id {
            color: #40777b;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">
            <h2 class="page-title mb-4"><i class="bi bi-bank me-2"></i>Quản Lý Xét Duyệt Nạp Tiền</h2>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Mã YC</th>
                        <th scope="col">Khách hàng</th>
                        <th scope="col">Số tiền nạp</th>
                        <th scope="col">Thời gian</th>
                        <th scope="col" class="text-center">Trạng Thái</th>
                        <th scope="col" class="text-center">Hành Động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="yc : ${danhSachYeuCau}">
                        <td class="yc-id" th:text="'#YC' + ${yc.id}">#YC1</td>
                        <td th:text="${yc.user.username}">Username</td>
                        <td class="price-text" th:text="${#numbers.formatDecimal(yc.soTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</td>
                        <td th:text="${yc.ngayTao != null ? #temporals.format(yc.ngayTao, 'dd/MM/yyyy HH:mm') : ''}">Thời gian</td>

                        <td class="text-center">
                            <span class="badge rounded-pill bg-warning text-dark" th:if="${yc.trangThai == 'CHỜ DUYỆT'}">Chờ duyệt</span>
                            <span class="badge rounded-pill bg-success" th:if="${yc.trangThai == 'ĐÃ DUYỆT'}">Đã duyệt</span>
                            <span class="badge rounded-pill bg-danger" th:if="${yc.trangThai == 'TỪ CHỐI'}">Từ chối</span>
                        </td>

                        <td class="text-center">
                            <th:block th:if="${yc.trangThai == 'CHỜ DUYỆT'}">
                                <a th:href="@{'/admin/naptien/duyet/' + ${yc.id}}" class="btn btn-outline-success btn-sm me-2 rounded-2" onclick="return confirm('Xác nhận CỘNG TIỀN vào ví khách hàng?');">
                                    <i class="bi bi-check-lg"></i> Duyệt
                                </a>
                                <a th:href="@{'/admin/naptien/tuchoi/' + ${yc.id}}" class="btn btn-outline-danger btn-sm rounded-2" onclick="return confirm('Từ chối yêu cầu này?');">
                                    <i class="bi bi-x-lg"></i> Hủy
                                </a>
                            </th:block>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(danhSachYeuCau)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="bi bi-inbox fs-1 d-block mb-3 text-black-50"></i>
                            Không có yêu cầu nạp tiền nào.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
