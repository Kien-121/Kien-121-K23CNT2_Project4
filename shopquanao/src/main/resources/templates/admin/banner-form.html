<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Banner - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; color: #333; font-family: 'Nunito', sans-serif; }
        .content-wrapper { background-color: #ffffff; border-radius: 16px; padding: 35px 40px; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px rgba(0,0,0,0.04); }
        .btn-theme { background-color: #2b5155; color: #fff; font-weight: bold; }
        .btn-theme:hover { background-color: #1f3b3e; color: #fff; }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">
            <div class="mb-4">
                <a th:href="@{/admin/banner}" class="text-decoration-none text-muted fw-bold"><i class="bi bi-arrow-left"></i> Quay lại</a>
                <h2 class="fw-bold mt-2" style="color: #2b5155;"><i class="bi bi-images me-2"></i>Thêm Banner Quảng Cáo</h2>
            </div>

            <form th:action="@{/admin/banner/save}" th:object="${banner}" method="post">
                <!-- Giữ lại ID nếu là form sửa -->
                <input type="hidden" th:field="*{id}">

                <div class="row g-4">
                    <!-- Ô MỚI: CHỌN VỊ TRÍ BANNER -->
                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary">Vị trí hiển thị <span class="text-danger">*</span></label>
                        <select class="form-select border-secondary" th:field="*{viTri}" required>
                            <option value="">-- Chọn vị trí hiển thị trên trang chủ --</option>
                            <option value="SLIDER">Slider đầu trang (Ảnh tự động chạy)</option>
                            <option value="TINTUC">Banner Khối Tin Tức (Bên cạnh bài viết)</option>
                            <option value="KHUYENMAI">Banner Khối Khuyến Mãi (Bên cạnh Voucher)</option>
                        </select>
                        <small class="text-muted">Hệ thống sẽ tự động phân loại ảnh về đúng vị trí dựa trên lựa chọn này.</small>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary">Tên chiến dịch / Mô tả Banner <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{tenBanner}" placeholder="VD: Khuyến mãi hè 2026..." required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label fw-bold text-secondary">Đường dẫn Hình ảnh (URL) <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{hinhAnh}" placeholder="https://..." required>
                        <small class="text-muted">Bạn có thể dùng link ảnh online để tối ưu dung lượng web.</small>
                    </div>
                </div>
                <hr class="my-4">
                <button type="submit" class="btn btn-theme px-4 py-2 rounded-3"><i class="bi bi-check2-circle me-1"></i> Lưu Banner</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
