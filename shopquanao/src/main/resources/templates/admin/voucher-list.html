<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Voucher - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Nền tổng thể và phông chữ */
        body {
            background-color: #f4f6f9;
            color: #333;
            font-family: 'Nunito', sans-serif;
        }

        /* Khung trắng chứa nội dung - Thêm shadow mượt mà */
        .content-wrapper {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 35px 40px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        /* Đổi màu tiêu đề trang */
        h3.fw-bold {
            color: #2b5155 !important;
            font-weight: 800 !important;
        }

        /* Nút Thêm Voucher (ghi đè btn-primary) - Thêm hiệu ứng hover */
        .btn-primary {
            background-color: #2b5155 !important;
            border-color: #2b5155 !important;
            color: #ffffff !important;
            border-radius: 10px !important;
            padding: 10px 24px;
            box-shadow: 0 4px 6px rgba(43, 81, 85, 0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #1e3b3e !important;
            border-color: #1e3b3e !important;
            box-shadow: 0 6px 12px rgba(43, 81, 85, 0.3);
            transform: translateY(-2px);
        }

        /* Ghi đè class table-dark sang giao diện sáng cực thoáng */
        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-border-color: #edf2f7;
            --bs-table-hover-bg: #f8fafc;
            color: #334155;
        }

        /* Ghi đè màu tiêu đề bảng (xử lý luôn class text-secondary của bạn) */
        .table-dark th, .table-dark thead tr.text-secondary th {
            color: #2b5155 !important;
            font-weight: 800 !important;
            text-transform: none;
            font-size: 0.95rem;
            letter-spacing: normal;
            border-bottom: 2px solid #e2e8f0;
            padding-top: 15px;
            padding-bottom: 15px;
        }

        .table-dark td {
            vertical-align: middle;
            color: #475569;
            border-bottom: 1px solid #edf2f7;
            font-weight: 600;
            padding-top: 15px;
            padding-bottom: 15px;
        }

        /* Định dạng Tên Mã CODE (ghi đè text-warning cho nổi bật trên nền sáng) */
        td.text-warning {
            color: #2b5155 !important;
            font-weight: 800 !important;
            font-size: 1.05rem;
            letter-spacing: 1px;
        }

        /* Nút Sửa (ghi đè btn-outline-info) */
        .btn-outline-info {
            color: #2b5155 !important;
            border-color: #2b5155 !important;
            border-radius: 8px !important;
            transition: all 0.2s ease;
        }
        .btn-outline-info:hover {
            background-color: #2b5155 !important;
            color: #ffffff !important;
        }

        /* Nút Xóa (bo góc & nảy khi hover) */
        .btn-outline-danger {
            border-radius: 8px !important;
            transition: all 0.2s ease;
        }
        .btn-outline-danger:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="d-flex" style="min-height: 100vh;">
    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold"><i class="bi bi-ticket-perforated me-2"></i> Danh sách Khuyến mãi</h3>
                <a th:href="@{/admin/voucher/add}" class="btn btn-primary fw-bold">
                    <i class="bi bi-plus-lg"></i> Thêm Voucher mới
                </a>
            </div>

            <table class="table table-dark table-hover align-middle">
                <thead>
                <tr class="text-secondary">
                    <th>ID</th>
                    <th>TÊN MÃ (CODE)</th>
                    <th>MỨC GIẢM (%)</th>
                    <th>NGÀY BẮT ĐẦU</th>
                    <th>NGÀY KẾT THÚC</th>
                    <th>HÀNH ĐỘNG</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="v : ${danhSachVoucher}">
                    <td th:text="${v.id}"></td>
                    <td class="fw-bold text-warning" th:text="${v.name}"></td>
                    <td th:text="${v.discount} + '%'"></td>
                    <td th:text="${v.startDate != null ? #temporals.format(v.startDate, 'dd/MM/yyyy') : ''}"></td>
                    <td th:text="${v.endDate != null ? #temporals.format(v.endDate, 'dd/MM/yyyy') : ''}"></td>
                    <td>
                        <a th:href="@{'/admin/voucher/edit/' + ${v.id}}" class="btn btn-sm btn-outline-info me-2"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{'/admin/voucher/delete/' + ${v.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Bạn có chắc muốn xóa mã giảm giá này?');"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(danhSachVoucher)}">
                    <td colspan="6" class="text-center text-muted py-4">Chưa có mã khuyến mãi nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
