<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Nhân viên - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* CSS nền sáng, phông chữ đồng bộ */
        body { background-color: #f4f6f9; color: #333; font-family: 'Nunito', sans-serif; }
        .content-wrapper { background-color: #ffffff; border-radius: 8px; padding: 30px; box-shadow: 0 0 15px rgba(0,0,0,0.05); border: 1px solid #e3e6f0; }

        /* Tiêu đề trang */
        h2.fw-bold { color: #2b5155; font-weight: 800 !important; }
        .text-muted.small { color: #64748b !important; font-weight: 600; }

        /* Nút Thêm Nhân Viên (ghi đè btn-primary sang màu xanh cổ vịt) */
        .btn-primary {
            background-color: #2b5155 !important;
            border-color: #2b5155 !important;
            border-radius: 8px !important;
        }
        .btn-primary:hover {
            background-color: #1e3b3e !important;
            border-color: #1e3b3e !important;
        }

        /* Ghi đè class table-dark sang giao diện sáng */
        .table-dark {
            --bs-table-bg: transparent;
            --bs-table-border-color: #edf2f7;
            color: #334155;
        }
        .table-dark th {
            color: #2b5155;
            font-weight: 700;
            text-transform: none;
            font-size: 0.95rem;
            letter-spacing: normal;
            border-bottom: 2px solid #e2e8f0;
        }
        .table-dark td {
            vertical-align: middle;
            color: #334155;
            border-bottom: 1px solid #edf2f7;
            font-weight: 600;
        }

        /* Đổi màu tên nhân viên (ghi đè text-white của bạn) */
        td.text-white { color: #40777b !important; font-weight: 800 !important; }

        /* Căn chỉnh lại các Badge cho hợp nền trắng */
        .user-badge {
            background-color: #edf2f7;
            color: #40777b;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
        }
        .position-badge {
            background-color: #f8fafc;
            color: #2b5155;
            border: 1px solid #cbd5e1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .bg-secondary.text-dark {
            background-color: #f1f5f9 !important;
            color: #94a3b8 !important;
            border: 1px dashed #cbd5e1;
        }

        /* Sửa nút Edit (btn-outline-warning khó nhìn trên nền trắng) sang tone xanh */
        .btn-outline-warning {
            color: #2b5155 !important;
            border-color: #2b5155 !important;
            border-radius: 8px !important;
        }
        .btn-outline-warning:hover {
            background-color: #2b5155 !important;
            color: #ffffff !important;
        }
        .btn-outline-danger {
            border-radius: 8px !important;
        }
    </style>
</head>
<body>

<div class="d-flex" style="min-height: 100vh;">

    <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

    <div class="flex-grow-1 p-4">
        <div class="content-wrapper">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold mb-1"><i class="bi bi-person-badge me-2"></i>Danh sách Nhân Viên</h2>
                    <p class="text-muted mb-0 small">Quản lý đội ngũ nhân sự của cửa hàng</p>
                </div>
                <a th:href="@{/admin/nhanvien/add}" class="btn btn-primary fw-bold px-4 py-2 rounded-3">
                    <i class="bi bi-plus-circle me-1"></i> Thêm Nhân Viên
                </a>
            </div>

            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Mã NV</th>
                        <th scope="col">Họ và Tên</th>
                        <th scope="col">Tài Khoản Gắn Kèm</th>
                        <th scope="col">Vị Trí / Chức Vụ</th>
                        <th scope="col" class="text-center">Hành Động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="nv : ${danhSachNhanVien}">
                        <td class="fw-bold" th:text="'NV' + ${nv.id}">NV1</td>
                        <td class="fw-bold text-white" th:text="${nv.name}">Tên Nhân Viên</td>

                        <td>
                            <span th:if="${nv.user != null}" class="user-badge" th:text="'@' + ${nv.user.username}">@username</span>
                            <span th:unless="${nv.user != null}" class="badge bg-secondary text-dark">Chưa có tài khoản</span>
                        </td>

                        <td>
                            <span class="position-badge" th:text="${nv.position}">Nhân viên kho</span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/admin/nhanvien/edit/{id}(id=${nv.id})}" class="btn btn-outline-warning btn-sm me-2 rounded-3">
                                <i class="bi bi-pencil-square"></i> Sửa
                            </a>
                            <a th:href="@{/admin/nhanvien/delete/{id}(id=${nv.id})}" class="btn btn-outline-danger btn-sm rounded-3" onclick="return confirm('Bạn có chắc chắn muốn xóa nhân viên này khỏi hệ thống?');">
                                <i class="bi bi-trash"></i> Xóa
                            </a>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(danhSachNhanVien)}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <i class="bi bi-person-x fs-1 d-block mb-2"></i> Chưa có dữ liệu nhân sự.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
